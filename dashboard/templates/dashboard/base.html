<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Growth CRM</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ChartJS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    

<style>
:root {
    --bg-light: #f4f6f9;
    --bg-dark: #0f172a;
    --card-light: #ffffff;
    --card-dark: #1e293b;
    --text-light: #111827;
    --text-dark: #e2e8f0;
}

body.light-mode {
    background-color: var(--bg-light);
    color: var(--text-light);
}

body.dark-mode {
    background-color: var(--bg-dark);
    color: var(--text-dark);
}

.sidebar {
    height: 100vh;
    background: linear-gradient(180deg, #111827, #1f2937);
    color: white;
    padding-top: 20px;
}

.sidebar a {
    color: #cbd5e1;
    text-decoration: none;
    display: block;
    padding: 12px 20px;
    border-radius: 8px;
}

.sidebar a:hover {
    background-color: #374151;
}

.card-kpi {
    border-radius: 16px;
    transition: transform 0.2s ease;
}

.card-kpi:hover {
    transform: translateY(-5px);
}
</style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <h4 class="text-center mb-4">🚀 Growth CRM</h4>

                <a href="{% url 'dashboard-home' %}">Dashboard</a>
                <a href="{% url 'dashboard-leads' %}">Leads</a>
                <button class="btn btn-sm btn-light mt-3" onclick="toggleMode()">Toggle Mode</button>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");
    document.body.classList.toggle("light-mode");
}
document.body.classList.add("light-mode");
</script>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">
                {% block content %}
                {% endblock %}
            </div>

        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
