<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Growth CRM</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ChartJS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: linear-gradient(180deg, #111827, #1f2937);
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background-color: #374151;
            color: white;
        }

        .card-kpi {
            border-radius: 16px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05);
        }

        .kpi-number {
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <h4 class="text-center mb-4">🚀 Growth CRM</h4>

                <a href="{% url 'dashboard-home' %}">Dashboard</a>
                <a href="{% url 'dashboard-leads' %}">Leads</a>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">
                {% block content %}
                {% endblock %}
            </div>

        </div>
    </div>

</body>

</html>
